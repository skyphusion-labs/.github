# Jekyll config for the GitHub Pages org site at https://github.skyphusion.org
# (custom domain via the CNAME file; DNS CNAME github.skyphusion.org -> skyphusion-labs.github.io).
# index.md wraps profile/README.md so the org profile and the web page stay one document.

title: Skyphusion Labs | Free Open Source Software
description: >-
  Skyphusion Labs builds free, open source software that is not for sale: the
  Vivijure AI film studio, Prism multimodal AI playground, Postern mailbox,
  The Hollow Grid MUD, Common Thread, and more. Founded by Conrad Rockenhaus;
  one human and an AI crew developing in the open on Cloudflare Workers and
  self-hosted Linux infrastructure. Engineering blog at skyphusion.net, lab at
  skyphusion.org, code at github.com/skyphusion-labs.
url: "https://github.skyphusion.org"
baseurl: ""
lang: en

author:
  name: Conrad Rockenhaus
  email: conrad@skyphusion.org

social:
  name: Skyphusion Labs
  links:
    - https://github.com/skyphusion-labs
    - https://github.com/skyphusion
    - https://skyphusion.org
    - https://skyphusion.net
    - https://github.skyphusion.net
    - https://x.com/skyphusion

defaults:
  - scope:
      path: ""
    values:
      image: https://skyphusion.net/og-default.png

theme: jekyll-theme-minimal

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Keep community-health and internal docs out of the rendered site.
exclude:
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - SECURITY.md
  - docs/
  - profile/
